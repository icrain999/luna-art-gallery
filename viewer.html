	<!-- Structured Data -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "VirtualTour",
		"name": "3D Virtual Gallery",
		"description": "An interactive WebGL-based 3D virtual gallery by OpenVGAL.",
		"url": "https://openvgal.com/",
		"image": "https://openvgal.com/preview.jpg",
		"provider": {
		"@type": "Organization",
		"name": "OpenVGAL",
		"url": "https://openvgal.com"
		}
	}
	</script>
	<script>
         <!--/////////////////////// CUSTOMIZE THIS VALUE //////////////////////////////////-->
		window.openvgal_location = '.';
		<!--/////////////////////// CUSTOMIZE THIS VALUE //////////////////////////////////-->
		

		// Amend header values with your choice. Only proceed if base is set and valid
        if (window.openvgal_location && window.openvgal_location.trim() !== '') {
            const baseUrl = window.openvgal_location;
            const fullPageUrl = baseUrl + '/virtual.html';
            const imageUrl = baseUrl + '/preview.jpg';
            const providerUrl = baseUrl.replace('/virtual', '');
    
            // Set canonical
            const canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) canonical.href = fullPageUrl;
    
            // Set Open Graph
            const ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.content = fullPageUrl;
            const ogImage = document.querySelector('meta[property="og:image"]');
            if (ogImage) ogImage.content = imageUrl;
    
            // Set Twitter
            const twitterImage = document.querySelector('meta[name="twitter:image"]');
            if (twitterImage) twitterImage.content = imageUrl;
    
            // Set Structured Data
            const structuredData = document.querySelector('script[type="application/ld+json"]');
            if (structuredData) {
                try {
                    const data = JSON.parse(structuredData.textContent);
                    data['@id'] = fullPageUrl;
                    data.url = fullPageUrl;
                    data.image = imageUrl;
                    data.provider.url = providerUrl;
                    structuredData.textContent = JSON.stringify(data, null, 2);
                } catch (e) {
                    console.warn('Failed to update structured data:', e);
                }
            }
        };


	</script>

       <style>

        /* Navigation Map */

        #map-grid {

            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;

            overflow: hidden;
            transition: transform 0.25s ease, border-color 0.25s, box-shadow 0.3s;
        }
        .map-card:hover {
            transform: translateY(-4px) scale(1.015);
            border-color: color-mix(in oklab, oklch(0.78 0.065 68) 55%, transparent);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px color-mix(in oklab, oklch(0.78 0.065 68) 25%, transparent);
        }
        .map-card.map-card-active {

            overflow: hidden;

            }

                font-size: 0.8rem;
            }

	<script>
	// URL-based mode overrides - must run before declarations.js
	// To use local templates/materials instead of CDN, set: window.openvgal_cdn_base = '';
	(function() {
		const urlParams = new URLSearchParams(window.location.search);
		if (urlParams.get('preview') === 'iframe' && window.parent) {
			window.openvgal_preview_mode = true;
			window.openvgal_cdn_base = window.parent.openvgal_cdn_base || window.location.origin;
			console.log('Preview mode: CDN base =', window.openvgal_cdn_base);
		}
		// Multi-tenant mode: ?openvgal_location=<absolute https URL> points the viewer
		// at a remote gallery (e.g. a published gallery on assets.openvgal.com).
		// Only https:// URLs are accepted, to avoid loading arbitrary third-party content.
		const locParam = urlParams.get('openvgal_location');
		if (locParam) {
			try {
				const u = new URL(locParam);
				if (u.protocol === 'https:') {
					window.openvgal_location = locParam;
					console.log('Remote location:', locParam);
				} else {
					console.warn('Ignoring openvgal_location: not https');
				}
			} catch (e) {
				console.warn('Ignoring openvgal_location: invalid URL');
			}
		}
		// Dev mode: serve repo root via static server, point viewer at examples/ + cdn/
		// Usage: from repo root run `python -m http.server 8080`, open
		//   http://localhost:8080/site/viewer.html?dev=1
		if (urlParams.get('dev') === '1') {
			window.openvgal_location = '/examples';
			window.openvgal_cdn_base = '/cdn';
			console.log('Dev mode: location=/examples, cdn=/cdn');
		}
	})();
	</script>

             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </div>
        <div id="map-grid"></div>
    </div>

    <script>
    function toggleMap() {
        var modal = document.getElementById('map-modal');
        if (!modal) return;
        var isHidden = modal.style.display === 'none' || modal.style.display === '';
        if (isHidden) {
            populateMap();
            modal.style.display = 'flex';
        } else {
            modal.style.display = 'none';
        }
    }

    function populateMap() {
        var grid = document.getElementById('map-grid');
        if (!grid || typeof config_file_content === 'undefined') return;
        grid.innerHTML = '';

        for (var galleryName in config_file_content) {
            if (galleryName === 'Technical') continue;

            var gallery = config_file_content[galleryName];
            var imageKeys = Object.keys(gallery).filter(function(k) {
                return gallery[k] && gallery[k].resource_type === 'image';
            });

            var card = document.createElement('div');
            card.className = 'map-card';
            if (galleryName === current_gallery) card.className += ' map-card-active';
            card.onclick = (function(name) {
                return function() { navigateToGallery(name); };
            })(galleryName);

            var wrap = document.createElement('div');
            wrap.className = 'map-card-thumb-wrap';
            if (imageKeys.length > 0) {
                var img = document.createElement('img');
                img.className = 'map-card-thumb';
                var resourcePath = gallery[imageKeys[0]].resource;
                img.src = (typeof window.resolveImageUrl === 'function')
                    ? window.resolveImageUrl(resourcePath)
                    : hallspics_prefix + resourcePath;
                img.alt = galleryName;
                img.loading = 'lazy';
                wrap.appendChild(img);
            } else {
                var placeholder = document.createElement('div');
                placeholder.className = 'map-card-placeholder';
                wrap.appendChild(placeholder);
            }
            card.appendChild(wrap);

            var info = document.createElement('div');
            info.className = 'map-card-info';

            var nameEl = document.createElement('p');
            nameEl.className = 'map-card-name';
            nameEl.textContent = galleryName === 'root' ? 'Main Hall' : galleryName.replace(/#/g, ' ');
            info.appendChild(nameEl);

            var countEl = document.createElement('p');
            countEl.className = 'map-card-count';
            countEl.textContent = imageKeys.length + (imageKeys.length === 1 ? ' artwork' : ' artworks');
            info.appendChild(countEl);

            card.appendChild(info);
            grid.appendChild(card);
        }
    }

    function navigateToGallery(name) {
        var params = new URLSearchParams(window.location.search);
        params.set('gallery', name);
        window.location.search = params.toString();
    }

    (function waitForConfig() {
        if (typeof config_file_content !== 'undefined' && config_file_content) {
            document.getElementById('map-button').style.display = 'flex';
        } else {
            setTimeout(waitForConfig, 200);
        }
    })();
    </script>
